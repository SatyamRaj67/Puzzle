<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="styles.css"
    />
    <title>Minecraft IRL</title>
  </head>
  <body>
    <!-- === CROSS HAIR === -->
    <div class="crosshair"></div>
    <!-- === DEBUG HUD === -->
    <div id="debug-hud">Press F3 to toggle</div>

    <!-- === PAUSE MENU === -->
    <div id="pause-menu">
      <div class="menu-container">
        <h1>Game Menu</h1>
        <div class="setting-group">
          <button id="btn-resume">Back to Game</button>
        </div>

        <div class="setting-group">
          <button id="btn-options">Options...</button>
          <button id="btn-devtools">Devtools</button>
        </div>

        <div class="setting-group">
          <button id="btn-quit">Save & Quit Game</button>
        </div>
      </div>
    </div>

    <!-- === OPTIONS MENU -->
    <div id="options-menu">
      <div class="menu-container">
        <div class="setting-group">
          <label>Field of View: <span id="fov-val">90°</span></label>
          <input
            type="range"
            id="fov-slider"
            min="60"
            max="120"
            value="90"
          />
        </div>

        <div class="setting-group">
          <label>Render: <span id="rd-val">4</span> Chunks</label>
          <input
            type="range"
            id="rd-slider"
            min="1"
            max="96"
            value="2"
          />
        </div>

        <div class="setting-group">
          <button id="go-pause-menu-from-options">Go Back</button>
        </div>
      </div>
    </div>

    <!-- === DEVTOOLS MENU === -->
    <div id="devtools-menu">
      <div class="menu-container">
        <div class="setting-group">
          <label
            ><span>Time Speed</span> <span id="speed-val">1.0x</span></label
          >
          <input
            type="range"
            id="speed-slider"
            min="0"
            max="50"
            value="10"
          />
        </div>

        <div class="setting-group">
          <button id="btn-toggle-time">Pause Time</button>
          <button id="btn-set-noon">Set Noon</button>
        </div>
        <div class="setting-group">
          <button id="btn-reset-world">Reset World</button>
        </div>

        <div class="setting-group">
          <button id="go-pause-menu-from-devtools">Go Back</button>
        </div>
      </div>
    </div>

    <!-- === HOTBAR === -->
    <div id="hotbar">
      <div
        class="slot active"
        data-index="0"
      >
        GRS
      </div>
      <div
        class="slot"
        data-index="1"
      >
        DIR
      </div>
      <div
        class="slot"
        data-index="2"
      >
        STN
      </div>
      <div
        class="slot"
        data-index="3"
      >
        OAK
      </div>
      <div
        class="slot"
        data-index="4"
      >
        LVS
      </div>
      <div
        class="slot"
        data-index="5"
      ></div>
      <div
        class="slot"
        data-index="6"
      ></div>
      <div
        class="slot"
        data-index="7"
      ></div>
      <div
        class="slot"
        data-index="8"
      ></div>
    </div>

    <!-- === INVENTORY === -->
    <div
      id="inventory-menu"
      style="display: none"
    >
      <div class="menu-container">
        <h2>Inventory</h2>
        <div id="inventory-grid">
          <!-- Inventory slots will be generated here -->
        </div>
      </div>
    </div>

    <img
      id="cursor-item"
      src=""
      alt="Cursor Item"
    />
  </body>
  <script
    type="module"
    src="/main.ts"
  ></script>
</html>
