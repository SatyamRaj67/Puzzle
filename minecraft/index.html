<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="styles.css"
    />
    <title>Minecraft IRL</title>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div class="crosshair"></div>
    <div id="debug-hud">Press F3 to toggle</div>

    <div id="pause-menu">
      <div class="menu-container">
        <h1>Game Paused</h1>

        <div class="setting-group">
          <label
            ><span>Field of View</span> <span id="fov-val">90°</span></label
          >
          <input
            type="range"
            id="fov-slider"
            min="60"
            max="120"
            value="90"
          />
        </div>

        <div class="setting-group">
          <label
            ><span>Render Distance</span>
            <span id="rd-val">2 Chunks</span></label
          >
          <input
            type="range"
            id="rd-slider"
            min="1"
            max="10"
            value="2"
          />
        </div>

        <div class="setting-group">
          <label
            ><span>Time Speed</span> <span id="speed-val">1.0x</span></label
          >
          <input
            type="range"
            id="speed-slider"
            min="0"
            max="50"
            value="10"
          />
        </div>

        <div class="btn-row">
          <button id="btn-toggle-time">Pause Time</button>
          <button id="btn-set-noon">Set Noon</button>
        </div>

        <button
          class="primary-btn"
          id="btn-resume"
        >
          Resume Game
        </button>
        <button
          class="danger-btn"
          id="btn-quit"
        >
          Save & Quit
        </button>
      </div>
    </div>

    <div id="hotbar">
      <div
        class="slot active"
        data-index="0"
      >
        GRS
      </div>
      <div
        class="slot"
        data-index="1"
      >
        DIR
      </div>
      <div
        class="slot"
        data-index="2"
      >
        STN
      </div>
      <div
        class="slot"
        data-index="3"
      >
        OAK
      </div>
      <div
        class="slot"
        data-index="4"
      >
        LVS
      </div>
      <div
        class="slot"
        data-index="5"
      ></div>
      <div
        class="slot"
        data-index="6"
      ></div>
      <div
        class="slot"
        data-index="7"
      ></div>
      <div
        class="slot"
        data-index="8"
      ></div>
    </div>
  </body>
  <script
    type="module"
    src="main.js"
  ></script>
</html>
